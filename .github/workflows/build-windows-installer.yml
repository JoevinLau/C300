name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installer
        shell: powershell
        run: pnpm package:win

      - name: Smoke-test bundled FastAPI backend
        shell: powershell
        run: |
          $backend = Resolve-Path "dist/c300-api/c300-api.exe"
          $process = Start-Process -FilePath $backend -WorkingDirectory (Split-Path $backend) -PassThru
          try {
            $ready = $false
            for ($attempt = 0; $attempt -lt 30; $attempt++) {
              try {
                $response = Invoke-RestMethod -Uri "http://127.0.0.1:8000/" -TimeoutSec 2
                if ($response.message -eq "API is running!") {
                  $ready = $true
                  break
                }
              }
              catch {
                Start-Sleep -Seconds 1
              }
            }
            if (-not $ready) {
              throw "Bundled FastAPI backend did not become healthy."
            }
          }
          finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: C300-Windows-Installer
          path: release/*.exe
          if-no-files-found: error
          retention-days: 14
